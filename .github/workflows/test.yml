name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        browser: [chromium]
        vscode-version: [stable, insiders]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'
      
      - name: Restore packages
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Compile, lint and test
        run: xvfb-run -a npm test -- --browserType ${{ matrix.browser }} --quality ${{ matrix.vscode-version }}
        timeout-minutes: 1
        if: runner.os == 'Linux'

      - name: Compile, lint and test
        run: npm test -- --browserType ${{ matrix.browser }} --quality ${{ matrix.vscode-version }}
        timeout-minutes: 1
        if: runner.os != 'Linux'
